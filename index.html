<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>صفحه ورود به سایت</title>
</head>
<body class="flex flex-col items-center justify-center bg-white w-screen h-screen bg-gradient-to-br from-blue-600 to-indigo-800">
    <div class="bg-white w-96 max-w-full border rounded-lg">
        <form class="flex flex-col gap-3 items-center p-10 w-full">
            <input type="text" placeholder="نام کاربری خود را وارد کنید" class="text-center border-2 rounded-lg text-gray-600 text-base w-full">
            <input type="password" placeholder="رمز را وارد کنید" class="text-center border-2 rounded-lg text-gray-600 text-base w-full">
            <button class="bg-blue-600 text-white px-6 py-2 rounded-lg transition duration-300 hover:bg-blue-800 active:scale-95">ورود</button>
        </form>
    </div>
</body>
</html>
